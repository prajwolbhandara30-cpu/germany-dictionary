<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Germany Dictionary</title>
    <style>
        body { background-color: #1a2a3a; color: white; font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        .welcome-screen { margin-bottom: 30px; animation: fadeIn 2s; }
        input { padding: 15px; width: 80%; max-width: 400px; border-radius: 5px; border: none; }
        button { padding: 15px 25px; background-color: #e6b800; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; text-align: left; max-width: 600px; margin: 20px auto; background: #253b50; padding: 20px; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="welcome-screen">
        <h1>Germany Dictionary</h1>
        <p>Your Gateway to Mastering German</p>
        <p style="font-size: 40px;">🙏</p>
    </div>

    <input type="text" id="searchInput" placeholder="Enter word or sentence...">
    <button onclick="searchWord()">Search</button>
    <div id="result"></div>

    <script>
        async function searchWord() {
            let word = document.getElementById("searchInput").value.trim();
            let resultDiv = document.getElementById("result");
            if (!word) { resultDiv.innerHTML = "Please enter a word!"; return; }
            resultDiv.innerHTML = "Searching...";

            try {
                // यहाँ हामी Free Dictionary API प्रयोग गर्दैछौं
                let response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                let data = await response.json();
                
                if (data.title) {
                    resultDiv.innerHTML = "<strong>Sorry, word not found.</strong><br>Try a simpler English word or check your spelling.";
                } else {
                    let res = data[0];
                    let output = `<h3>${res.word}</h3>`;
                    res.meanings.forEach(m => {
                        output += `<p><strong>${m.partOfSpeech}:</strong> ${m.definitions[0].definition}</p>`;
                    });
                    resultDiv.innerHTML = output;
                }
            } catch (e) {
                resultDiv.innerHTML = "Error loading dictionary. Please try again later.";
            }
        }
    </script>
</body>
</html>
