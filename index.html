<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Germany Dictionary</title>
    <style>
        body { background-color: #1a2a3a; color: white; text-align: center; font-family: Arial, sans-serif; padding: 50px; }
        
        /* एनिमेसनको लागि */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .welcome-screen { animation: fadeIn 2s; }
        .emoji { font-size: 50px; display: block; margin: 10px 0; }
        
        input { padding: 12px; width: 60%; border-radius: 5px; border: none; margin-bottom: 10px; color: #333; }
        button { padding: 12px 20px; background-color: #e6b800; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #result { margin-top: 20px; text-align: left; display: inline-block; max-width: 600px; width: 90%; }
        .meaning-box { background: #253b50; padding: 15px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="welcome-screen">
        <h1>Welcome to Germany Dictionary</h1>
        <p>Your Gateway to Mastering German</p>
        <span class="emoji">🙏</span>
    </div>

    <input type="text" id="searchInput" placeholder="Enter German word...">
    <button onclick="searchWord()">Search</button>
    
    <div id="result"></div>

    <script>
        async function searchWord() {
            let word = document.getElementById("searchInput").value.trim();
            let resultDiv = document.getElementById("result");
            
            if (!word) { resultDiv.innerHTML = "Please enter a word!"; return; }
            resultDiv.innerHTML = "Searching...";

            try {
                // जर्मन शब्दको लागि API
                let response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/de/${word}`);
                let data = await response.json();
                
                if (data.title) {
                    resultDiv.innerHTML = "<p>Word not found!</p>";
                } else {
                    // धेरै अर्थहरू देखाउनका लागि लूप
                    let htmlContent = "<h3>Meanings:</h3>";
                    data[0].meanings.forEach(m => {
                        htmlContent += `<div class="meaning-box"><strong>${m.partOfSpeech}:</strong> ${m.definitions[0].definition}</div>`;
                    });
                    resultDiv.innerHTML = htmlContent;
                }
            } catch (error) {
                resultDiv.innerHTML = "Error connecting to server.";
            }
        }
    </script>
</body>
</html>
